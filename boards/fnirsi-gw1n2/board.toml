# Pluribus board config — FNIRSI 2C53T handheld oscilloscope (GOWIN GW1N-2)
#
# Second GOWIN device in the pluribus engine and the GW1N-2 fidelity target.
# The bitstream is DavidClawson's open-source GW1N-2 apicula capture of the
# FNIRSI scope firmware.  Decode runs under the oss-cad-suite interpreter
# (apycula) as a subprocess (scripts/gowin_unpack.py) and emits a .gwconfig the
# pure-Python 3.15t lifter (lifters/gowin_lift.py) reads back.
#
# Usage:
#   PLURIBUS_SQLITE_PATH=tmp/fnirsi.db \
#     python3.15t scripts/run_pipeline.py --board boards/fnirsi-gw1n2 --all
#
# PACKAGE: deliberately UNSET — no apicula table is correct for this part (#73).
#
# GROUND TRUTH: the device is a Gowin GW1N-UV2 in the standard **QN48** package
# (48-pin QFN, 6 x 6 mm; ordering code GW1N-UV2QN48C6/I5; NOT QN48H).  Physically
# confirmed from the chip marking on 2026-06-13 and documented in the
# OpenScope-2C53T programming guide.  IDCODE 0x0120681B corroborates GW1N-2.
#
# The vendor's own tables (GOWINHOME/IDE/data/device/) resolve our exact part via
# device_package.csv:
#
#     gw1n2-020, GW1N-UV2QN48C6/I5, GW1N, GW1N-2, QFN48, GW1N-2/QFN48.json
#
# i.e. package QFN48, **41 I/O**, die GW1N-2.
#
# apicula ships NO QN48/QFN48 table for GW1N-2 — only LQFP100/LQFP100X (81 pads)
# and QFN48X/QFN48XF (40 pads).  And QFN48X is NOT a near-proxy: per the vendor
# catalogue it belongs to a DIFFERENT part on a DIFFERENT die
# (GW1N-LV1P5QN48XC6/I5, die GW1N-1P5B, 40 I/O).  Measured against the vendor
# QFN48 table for our part:
#
#     35 pins overlap  ->  0 AGREE, 35 DISAGREE
#     IOR1B (master run/re-arm pad):  vendor QFN48 = pin 46,  apicula QFN48X = 35
#
# So BOTH previously-tried settings were wrong: LQFP100 (issue #69) and QFN48X
# (its short-lived replacement) are different physical packages whose pin NUMBERS
# do not apply to this board at all.  Widely-quoted "QFN48 proxy" pin numbers
# (e.g. run/re-arm = pin 35) inherit the same error; the vendor table says 46.
#
# Therefore no package is set: a wrong pin number is worse than none, because it
# looks authoritative to anyone probing the hardware.  With package unset, pads
# carry no pin but are NOT lost — load.py net-names every routed pad after its
# location (source='gowin_iob_unbonded'), so each stays recoverable by name.
#
# PROPER FIX (#74): ingest the vendor's own GW1N-2/QFN48.json as a
# pluribus-owned pinout override, which gives authoritative pin numbers for the
# real part — and is a clean upstream contribution back to apicula.

[board]
name    = "FNIRSI 2C53T (GW1N-2)"
device  = "GW1N-2"       # apycula chip database name (GW1N-2.msgpack.xz)
# package intentionally omitted — see the PACKAGE note above (#73/#74).
lifter  = "gowin"
top     = "fnirsi"

[files]
pins_tsv = "pins.tsv"

# The raw .fs is DavidClawson's open-source GW1N-2 apicula capture (external,
# read-only).  The .gwconfig is REGENERABLE (gowin_unpack output) so it lives in
# pluribus tmp/; run_pipeline's [unpack] stage runs only when `bin` is set AND
# `config` does not yet exist.
[bitstreams.FNIRSI]
bin    = "/mnt/2tb/git_mirror/DavidClawson/gw1n2-apicula/tools/m5/scope.fs"
config = "../../tmp/gowin/FNIRSI.gwconfig"
