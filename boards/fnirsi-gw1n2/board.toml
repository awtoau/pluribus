# Pluribus board config — FNIRSI 2C53T handheld oscilloscope (GOWIN GW1N-2)
#
# Second GOWIN device in the pluribus engine and the GW1N-2 fidelity target.
# The bitstream is DavidClawson's open-source GW1N-2 apicula capture of the
# FNIRSI scope firmware.  Decode runs under the oss-cad-suite interpreter
# (apycula) as a subprocess (scripts/gowin_unpack.py) and emits a .gwconfig the
# pure-Python 3.15t lifter (lifters/gowin_lift.py) reads back.
#
# Usage:
#   PLURIBUS_SQLITE_PATH=tmp/fnirsi.db \
#     python3.15t scripts/run_pipeline.py --board boards/fnirsi-gw1n2 --all
#
# PACKAGE: QFN48X — the physical package is now KNOWN (issue #73).
#
# GROUND TRUTH: the device is a Gowin GW1N-UV2 in the standard **QN48** package
# (48-pin QFN, 6 x 6 mm; ordering code of the form GW1N-UV2QN48C6/I5; NOT QN48H).
# Physically confirmed from the chip marking on 2026-06-13 and documented in the
# OpenScope-2C53T programming guide.  IDCODE 0x0120681B corroborates GW1N-2.
#
# apicula ships NO "QN48" table for GW1N-2 — only LQFP100/LQFP100X (81 pads) and
# QFN48X/QFN48XF (40 pads).  QFN48X is therefore the nearest proxy: it is the
# 48-pin QFN family, and it places IOR1B at pin 35, matching the confirmed
# upstream pinout exactly.
#
# This RETIRES the earlier LQFP100 choice (issue #69), which was a coverage
# heuristic made before the package was known:
#
#     LQFP100   20 / 23 real pads bonded   -- but IOR1B NOT bonded at all
#     QFN48X    14 / 23 real pads bonded   -- IOR1B = pin 35 (confirmed)
#
# LQFP100's higher coverage is an artefact of it being an 81-pad table, not
# evidence of correctness: it is a physically different package, so its pin
# NUMBERS do not correspond to this board at all.  Fewer-but-correct pin numbers
# beat more-but-wrong ones — wrong numbers actively mislead anyone probing the
# hardware.  Notably the correct package RECOVERS the master run/re-arm pin
# (IOR1B = 35) that LQFP100 could never resolve.
#
# RESIDUAL GAP (still open, #73): apicula's QFN48X table bonds only 14 of the 23
# real pads and omits some the design drives, and IOT3A is a routed pad that is
# unbonded in EVERY GW1N-2 table.  Since the real part is a 48-pin QN48, those
# omissions are most likely INCOMPLETENESS in apicula's tables rather than
# genuinely unbonded die pads — an upstream data gap, not a physical fact.
#
# Pads that remain unbonded under this table still get no pin number, but they
# are NOT lost: load.py net-names every routed-but-unbonded pad after its
# location (source='gowin_iob_unbonded'), so each stays recoverable by name.
# Treat any pin number derived from this table as PROXY-CONFIRMED (it matches
# the documented QN48 pinout where both cover a pad) rather than exhaustive.

[board]
name    = "FNIRSI 2C53T (GW1N-2)"
device  = "GW1N-2"       # apycula chip database name (GW1N-2.msgpack.xz)
package = "QFN48X"       # nearest apicula proxy for the physical QN48 (see above)
lifter  = "gowin"
top     = "fnirsi"

[files]
pins_tsv = "pins.tsv"

# The raw .fs is DavidClawson's open-source GW1N-2 apicula capture (external,
# read-only).  The .gwconfig is REGENERABLE (gowin_unpack output) so it lives in
# pluribus tmp/; run_pipeline's [unpack] stage runs only when `bin` is set AND
# `config` does not yet exist.
[bitstreams.FNIRSI]
bin    = "/mnt/2tb/git_mirror/DavidClawson/gw1n2-apicula/tools/m5/scope.fs"
config = "../../tmp/gowin/FNIRSI.gwconfig"
